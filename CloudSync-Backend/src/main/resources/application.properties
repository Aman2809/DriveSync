spring.application.name=cloudsync
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/cloudsync_db
spring.datasource.username=root
spring.datasource.password=Amanj@2809

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=219576646160-ai8k1m2gs42d2tc0v6i4lm6ucl39qu1q.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=profile,email,https://www.googleapis.com/auth/drive
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-name=Google

# Google Provider Configuration (to get refresh tokens)
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth?access_type=offline&prompt=consent

# Dropbox OAuth2 Configuration
spring.security.oauth2.client.registration.dropbox.provider=dropbox
spring.security.oauth2.client.registration.dropbox.client-id=33gavow4m2iq71y
spring.security.oauth2.client.registration.dropbox.client-secret=4q2fnc3rvotp2if
spring.security.oauth2.client.registration.dropbox.redirect-uri=http://localhost:8080/login/oauth2/code/dropbox
spring.security.oauth2.client.registration.dropbox.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.dropbox.scope=account_info.read,files.metadata.read,files.content.read,files.content.write
spring.security.oauth2.client.registration.dropbox.client-name=Dropbox

# Dropbox Provider Configuration
spring.security.oauth2.client.provider.dropbox.authorization-uri=https://www.dropbox.com/oauth2/authorize
spring.security.oauth2.client.provider.dropbox.token-uri=https://api.dropboxapi.com/oauth2/token
spring.security.oauth2.client.provider.dropbox.user-info-uri=https://api.dropboxapi.com/2/users/get_current_account

# Logging Configuration
logging.level.com.project.cloudsync.service.GoogleOAuth2UserService=DEBUG
logging.level.com.project.cloudsync.service.DropboxOAuth2UserService=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG